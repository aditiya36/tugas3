# GitHub Actions workflow untuk build APK di cloud
# Tidak perlu Android Studio di lokal!

name: Build Android APK

on:
  # trigger otomatis saat push ke main
  push:
    branches: [main]
  # bisa juga trigger manual dari GitHub UI
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # 1. checkout source code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. setup Node.js (harus sama dengan versi lokal agar lockfile kompatibel)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      # 3. setup Java (dibutuhkan oleh Gradle)
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 4. setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 5. install dependencies
      - name: Install dependencies
        run: npm ci

      # 6. build Astro (generate dist/)
      - name: Build web app
        run: npm run build

      # 7. sync ke Capacitor Android
      - name: Sync Capacitor
        run: npx cap sync android

      # 8. set executable permission untuk gradlew
      - name: Make gradlew executable
        run: chmod +x ./android/gradlew

      # 9. build debug APK via Gradle
      - name: Build debug APK
        working-directory: ./android
        run: ./gradlew assembleDebug

      # 10. upload APK sebagai artifact (bisa didownload dari GitHub Actions UI)
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: crypto-tracker-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
